<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GTD — Chip</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #94a3b8; display: inline-block;
    margin-left: 8px; flex-shrink: 0;
    transition: background 0.4s;
  }
  .sync-dot.online  { background: #22c55e; }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 0.8s infinite; }
  .sync-dot.offline { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
  <style>
    :root {
      --bg: #eef1f8;
      --surface: #ffffff;
      --sidebar-bg: #08111f;
      --border: #e0e6f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── CAPTURE BAR ── */
    .capture-bar {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(37,99,235,0.35);
    }
    .capture-bar input {
      flex: 1;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 9px;
      padding: 9px 16px;
      font-size: 14px;
      color: white;
      outline: none;
      font-family: inherit;
    }
    .capture-bar input::placeholder { color: rgba(255,255,255,0.45); }
    .capture-bar input:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.55); }
    .capture-btn {
      background: rgba(255,255,255,0.96);
      color: var(--accent);
      border: none;
      border-radius: 9px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      letter-spacing: 0.01em;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      transition: all 0.12s;
    }
    .capture-btn:hover { background: white; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.2); }

    /* ── LAYOUT ── */
    .app { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 226px;
      min-width: 226px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0 0 24px;
      border-right: 1px solid rgba(255,255,255,0.04);
    }
    .sidebar::-webkit-scrollbar { width: 0; }
    .sidebar-logo {
      padding: 20px 18px 18px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-logo::before {
      content: '◈';
      color: var(--accent);
      font-size: 16px;
      opacity: 0.85;
    }
    .sidebar-section {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      padding: 16px 18px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      margin: 1px 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.12s, color 0.12s;
      user-select: none;
      position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.88); }
    .nav-item.active {
      background: rgba(37,99,235,0.22);
      color: white;
      font-weight: 600;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }
    .nav-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-label { flex: 1; letter-spacing: 0.01em; }
    .nav-badge {
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.65);
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 2px 7px;
      min-width: 20px;
      text-align: center;
    }
    .nav-item.active .nav-badge { background: rgba(37,99,235,0.4); color: rgba(255,255,255,0.9); }
    .nav-badge.hot { background: #c8622a; color: white; }
    .tag-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      margin: 1px 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.12s, color 0.12s;
    }
    .tag-row:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.88); }
    .tag-row.active { background: rgba(37,99,235,0.22); color: white; font-weight: 500; }
    .tag-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 50%; }
    .tag-add {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      margin: 1px 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.12s;
    }
    .tag-add:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }

    /* ── MAIN ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px 56px;
    }
    .view-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .view-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .view-count { font-size: 13px; color: var(--muted); margin-left: 10px; font-weight: 400; }

    /* Tag filter chips */
    .filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-label { font-size: 11px; color: var(--muted); }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      opacity: 0.55;
      transition: opacity 0.12s, border-color 0.12s;
      user-select: none;
    }
    .chip:hover { opacity: 0.85; }
    .chip.on { opacity: 1; border-color: currentColor; }

    /* Item rows */
    .item-list { display: flex; flex-direction: column; }
    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
    }
    .item-row:hover {
      box-shadow: var(--shadow-md);
      border-color: #c8d4ed;
      transform: translateY(-1px);
    }
    .item-cb { width: 17px; height: 17px; min-width: 17px; accent-color: var(--accent); cursor: pointer; margin-top: 2px; }
    .item-body { flex: 1; min-width: 0; }
    .item-text { font-size: 14px; line-height: 1.5; font-weight: 500; color: var(--text); }
    .item-text.done { text-decoration: line-through; color: var(--muted); font-weight: 400; }
    .item-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; align-items: center; }
    .item-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .item-waiting-badge { font-size: 11px; color: var(--muted); }
    .item-proj-badge { font-size: 11px; color: var(--muted); font-style: italic; }
    .item-chevron { color: #cbd5e1; font-size: 16px; align-self: center; }

    /* Section divider */
    .section-divider {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: var(--muted);
      padding: 20px 0 8px;
    }

    /* Empty state */
    .empty { text-align: center; padding: 64px 20px; color: var(--muted); }
    .empty .e-icon { font-size: 40px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6; }

    /* Projects */
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s;
    }
    .proj-card:hover { box-shadow: var(--shadow-md); }
    .proj-head {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 14px 17px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .proj-head:hover { background: #f8faff; }
    .proj-arrow { font-size: 10px; color: #94a3b8; width: 14px; transition: transform 0.15s; }
    .proj-arrow.open { transform: rotate(90deg); }
    .proj-name { font-size: 14px; font-weight: 700; flex: 1; letter-spacing: -0.01em; }
    .proj-tags { display: flex; gap: 5px; }
    .proj-tally { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .proj-menu-btn { background: none; border: none; color: var(--muted); font-size: 18px; line-height: 1; cursor: pointer; padding: 0 2px; border-radius: 5px; transition: all 0.12s; }
    .proj-menu-btn:hover { color: var(--accent); background: var(--accent-light); }
    .proj-body { border-top: 1px solid var(--border); padding: 6px 17px 14px; background: #fafbff; }
    .proj-task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f4fc;
    }
    .proj-task:last-of-type { border-bottom: none; }
    .proj-task-text { flex: 1; font-size: 13px; cursor: pointer; line-height: 1.45; font-weight: 500; }
    .proj-task-text:hover { color: var(--accent); }
    .proj-task-text.done { text-decoration: line-through; color: var(--muted); font-weight: 400; }
    .proj-add-task {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 0 2px;
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.1s;
    }
    .proj-add-task:hover { color: var(--accent); }
    .new-proj-btn {
      width: 100%;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 14px 17px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }
    .new-proj-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,17,31,0.5);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 30px;
      max-width: 500px;
      width: 94%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22), 0 4px 16px rgba(0,0,0,0.1);
    }
    .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.01em; }
    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    /* Checkbox rows — immune to .field label block override */
    .cb-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
      width: fit-content;
    }
    .cb-row input[type="checkbox"] {
      width: 16px; height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      margin: 0;
    }
    .cb-row span {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .inp {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .inp:focus { border-color: var(--accent); background: #fff; }
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      resize: vertical;
      min-height: 68px;
    }
    .textarea:focus { border-color: var(--accent); background: #fff; }
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .dest-btn {
      padding: 9px 8px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: none;
      font-size: 12px;
      font-family: inherit;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .dest-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .dest-btn.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .tag-picker { display: flex; gap: 6px; flex-wrap: wrap; min-height: 28px; }
    .pick-chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      opacity: 0.48;
      transition: opacity 0.1s, border-color 0.1s;
      user-select: none;
    }
    .pick-chip:hover { opacity: 0.85; }
    .pick-chip.on { opacity: 1; border-color: currentColor; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; align-items: center; }
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 9px 22px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3);
      transition: all 0.12s;
    }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.4); }
    .btn-ghost {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .btn-ghost:hover { border-color: #c8d4ed; color: var(--text); background: #f8faff; }
    .btn-danger {
      background: none;
      color: #b94040;
      border: 1px solid #f0d0d0;
      border-radius: 9px;
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-right: auto;
      transition: all 0.12s;
    }
    .btn-danger:hover { background: #fff4f4; border-color: #f5a0a0; }
    .hidden { display: none !important; }

    /* Notes */
    .notes-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .notes-tab {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.12s;
      user-select: none;
    }
    .notes-tab:hover { color: var(--text); }
    .notes-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .journal-today {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .journal-today-date { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
    .journal-ta {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.7;
      min-height: 180px;
    }
    .journal-saved { font-size: 11px; color: var(--accent); text-align: right; margin-top: 8px; height: 14px; transition: opacity 0.3s; }
    .past-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px; overflow: hidden; }
    .past-entry-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; }
    .past-entry-head:hover { background: #fafaf7; }
    .past-entry-date { font-size: 13px; font-weight: 600; flex: 1; }
    .past-entry-snippet { font-size: 12px; color: var(--muted); max-width: 300px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .past-entry-body { border-top: 1px solid var(--border); padding: 12px 14px; font-size: 14px; line-height: 1.65; color: var(--text); word-break: break-word; }
    /* Markdown rendered content */
    .md-body { font-size: 14px; line-height: 1.7; color: var(--text); word-break: break-word; }
    .md-body h1 { font-size: 18px; font-weight: 800; margin: 14px 0 6px; }
    .md-body h2 { font-size: 16px; font-weight: 700; margin: 12px 0 5px; }
    .md-body h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; }
    .md-body p  { margin: 0 0 8px; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body ul, .md-body ol { padding-left: 20px; margin: 4px 0 8px; }
    .md-body li { margin-bottom: 3px; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
    .md-body code { background: #f1f5f9; border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
    .md-body blockquote { border-left: 3px solid var(--accent); padding: 4px 12px; color: var(--muted); margin: 6px 0; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    /* Markdown hint bar */
    .md-hint { font-size: 11px; color: var(--muted); padding: 5px 2px 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .md-hint code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 11px; color: #475569; }
    .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; margin-bottom: 6px; cursor: pointer; transition: box-shadow 0.12s, border-color 0.12s; }
    .note-card:hover { box-shadow: var(--shadow); border-color: #d0cbc4; }
    .note-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .note-card-snippet { font-size: 13px; color: var(--muted); line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .note-card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .note-card-date { font-size: 11px; color: var(--muted); }
    .modal-wide { max-width: 620px !important; }
    .note-textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; resize: vertical; min-height: 240px; line-height: 1.7; }
    .note-textarea:focus { border-color: var(--accent); background: #fff; }

    /* Scrollbar */
    .main::-webkit-scrollbar { width: 5px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    /* ── FOCUS MODE ── */
    .focus-section {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 14px 16px 10px;
      margin-bottom: 20px;
    }
    .focus-section-title {

const PALETTES = [

  { bg:'#f0fdf4', fg:'#15803d' }, // green
  { bg:'#faf5ff', fg:'#7e22ce' }, // purple

  { bg:'#fff1f2', fg:'#be123c' }, // rose
  { bg:'#f0f9ff', fg:'#0369a1' }, // sky
  { bg:'#f5f3ff', fg:'#6d28d9' }, // violet
];

// Inline markdown renderer — no external dependency
function md(text) {
  if (!text) return '';
  const lines = text.replace(/\r\n/g,'\n').split('\n');
  let html = '';
  let inUl = false, inOl = false, inBq = false;

  function closeList() {
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
  }
  function closeBq() {
    if (inBq) { html += '</blockquote>'; inBq = false; }
  }
  function inline(s) {
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/__(.+?)__/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/_(.+?)_/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>')
      .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>');
  }

  lines.forEach(line => {
    // Headings
    if (/^### (.+)/.test(line)) { closeList(); closeBq(); html += `<h3>${inline(line.slice(4))}</h3>`; return; }
    if (/^## (.+)/.test(line))  { closeList(); closeBq(); html += `<h2>${inline(line.slice(3))}</h2>`; return; }
    if (/^# (.+)/.test(line))   { closeList(); closeBq(); html += `<h1>${inline(line.slice(2))}</h1>`; return; }
    // HR
    if (/^---+$/.test(line.trim())) { closeList(); closeBq(); html += '<hr>'; return; }
    // Blockquote
    if (/^> (.*)/.test(line)) {
      closeList();
      if (!inBq) { html += '<blockquote>'; inBq = true; }
      html += `<p>${inline(line.slice(2))}</p>`; return;
    }
    closeBq();
    // Unordered list
    if (/^[-*+] (.*)/.test(line)) {
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${inline(line.replace(/^[-*+] /,''))}</li>`; return;
    }
    // Ordered list
    if (/^\d+\. (.*)/.test(line)) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += `<li>${inline(line.replace(/^\d+\. /,''))}</li>`; return;
    }
    // Blank line
    if (!line.trim()) { closeList(); html += ''; return; }
    // Paragraph
    closeList();
    html += `<p>${inline(line)}</p>`;
  });

  closeList(); closeBq();
  return html;
}

function tagPalette(name) {
  const n = [...(name||'')].reduce((a,c) => a + c.charCodeAt(0), 0);
  return PALETTES[n % PALETTES.length];
}

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot');
  if (dot) { dot.className = 'sync-dot ' + state; dot.title = state; }
}

// Listen for remote changes and update localStorage + re-render
fbRef.on('value', snap => {
  const data = snap.val();
  if (!data) { _fbReady = true; return; }
  if (_ignoreNext) { _ignoreNext = false; _fbReady = true; setSyncDot('online'); return; }
  const keys = ['items','projects','tags','journal','snotes','review','daily'];
  keys.forEach(k => {
    if (data[k] !== undefined) {
      localStorage.setItem('g_' + k, JSON.stringify(data[k]));
    }
  });
  _fbReady = true;
  setSyncDot('online');
  if (document.getElementById('app')) render();
});

fbDb.ref('.info/connected').on('value', snap => {
  setSyncDot(snap.val() ? 'online' : 'offline');
});

function fbSave(key, val) {
  setSyncDot('syncing');
  _ignoreNext = true;
  fbRef.child(key).set(val)
    .then(() => setSyncDot('online'))
    .catch(() => { setSyncDot('offline'); _ignoreNext = false; });
}

// ═══════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════
const DB = {
  items()      { return JSON.parse(localStorage.getItem('g_items')    || '[]'); },
  projects()   { return JSON.parse(localStorage.getItem('g_projects') || '[]'); },
  tags()       { return JSON.parse(localStorage.getItem('g_tags')     || '[]'); },
  journal()    { return JSON.parse(localStorage.getItem('g_journal')  || '{}'); },
  savedNotes() { return JSON.parse(localStorage.getItem('g_snotes')   || '[]'); },
  review()     { return JSON.parse(localStorage.getItem('g_review')   || '{"week":null,"checked":[false,false,false,false,false,false,false,false]}'); },
  daily()      { return JSON.parse(localStorage.getItem('g_daily')    || '{"date":null,"checked":[false,false,false,false,false,false],"win":""}'); },
  save(key, val) {
    localStorage.setItem('g_' + key, JSON.stringify(val));
    fbSave(key, val);
  },
};

// ═══════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════
let S = {
  view: 'inbox',              // inbox | next | projects | waiting | someday | notes
  tagFilter: null,            // sidebar tag filter → shows tag view
  nextFilter: null,           // inline tag filter within next actions / saved notes
  expanded: new Set(),        // expanded project IDs
  expandedArchive: new Set(), // expanded archive sections per project ID
  notesTab: 'journal',        // journal | saved
  expandedEntries: new Set(), // expanded past journal entry dates
};

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  const items    = DB.items();
  const tags     = DB.tags();
  const inboxN   = items.filter(i => i.status === 'inbox').length;
  const nextN    = items.filter(i => i.status === 'next' && !i.done).length;
  const waitN    = items.filter(i => i.status === 'waiting' && !i.done).length;
  const focusN   = items.filter(i => i.focus && !i.done).length;
  const weekN    = items.filter(i => i.week  && !i.done).length;

  const navItems = [
    { id:'all',      icon:'📋', label:'All Open Tasks',  badge: nextN + waitN },
    { id:'inbox',    icon:'📥', label:'Inbox',           badge: inboxN, hot: inboxN > 0 },
    { id:'daily',    icon:'🌅', label:'Daily Review',    badge: null },
    { id:'focus',    icon:'⭐', label:"Today's Focus",   badge: focusN, hot: focusN > 0 },
    { id:'week',     icon:'📅', label:"This Week",       badge: weekN,  hot: weekN > 0 },
    { id:'next',     icon:'⚡', label:'Next Actions',    badge: nextN },
    { id:'waiting',  icon:'⏳', label:'Waiting For',     badge: waitN },
    { id:'someday',  icon:'💭', label:'Someday / Maybe', badge: null },
    { id:'projects', icon:'📁', label:'Projects',        badge: null },
    { id:'roles',    icon:'👤', label:'Roles',           badge: null },
    { id:'areas',    icon:'🗺️', label:'Areas',           badge: null },
    { id:'notes',    icon:'📓', label:'Notes',           badge: null },
    { id:'search',   icon:'🔍', label:'Search',          badge: null },
    { id:'review',   icon:'🗓️', label:'Weekly Review',   badge: null },
  ];

  let h = `<div class="sidebar-logo">GTD<span id="sync-dot" class="sync-dot" title="connecting…"></span></div>`;
  h += `<div class="sidebar-section">Lists</div>`;

  navItems.forEach(n => {
    const a = (!S.tagFilter && S.view === n.id) ? ' active' : '';
    const bHtml = n.badge !== null
      ? `<span class="nav-badge${n.hot && n.badge > 0 ? ' hot' : ''}">${n.badge}</span>`
      : '';
    h += `<div class="nav-item${a}" onclick="setView('${n.id}')">
            <span class="nav-icon">${n.icon}</span>
            <span class="nav-label">${n.label}</span>${bHtml}
          </div>`;
  });

  h += `<div class="sidebar-section" style="margin-top:8px">Tags</div>`;
  tags.forEach(tag => {
    const p = tagPalette(tag);
    const a = S.tagFilter === tag ? ' active' : '';
    h += `<div class="tag-row${a}" onclick="toggleTagFilter('${esc(tag)}')">
            <div class="tag-dot" style="background:${p.fg}"></div>
            <span style="flex:1">${esc(tag)}</span>
          </div>`;
  });
  h += `<div class="tag-add" onclick="openTagModal()">＋ New Tag</div>`;

  h += `<div style="margin-top:auto;padding:20px 12px 4px">
    <div onclick="exportBackup()" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.1s" onmouseover="this.style.color='rgba(255,255,255,0.6)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">
      ⬇ Backup data
    </div>
    <div onclick="importNotionData()" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.1s" onmouseover="this.style.color='rgba(255,255,255,0.6)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">
      🔄 Import from Notion
    </div>
  </div>`;

  document.getElementById('sidebar').innerHTML = h;
}

function renderMain() {
  const el = document.getElementById('main');
  if (S.tagFilter) { renderTagView(el); return; }
  switch (S.view) {
    case 'inbox':    renderInbox(el);    break;
    case 'next':     renderNext(el);     break;
    case 'waiting':  renderWaiting(el);  break;
    case 'someday':  renderSomeday(el);   break;
    case 'projects': renderProjLike(el, 'project', 'Projects', '📁'); break;
    case 'roles':    renderProjLike(el, 'role',    'Roles',    '👤'); break;
    case 'areas':    renderProjLike(el, 'area',    'Areas',    '🗺️'); break;
    case 'all':      renderAllTasks(el);  break;
    case 'notes':    renderNotes(el);     break;
    case 'search':   renderSearch(el);   break;
    case 'focus':    renderFocusView(el);  break;
    case 'week':     renderWeekView(el);   break;
    case 'daily':    renderDailyReview(el); break;
    case 'review':   renderReview(el);    break;
  }
}

function setView(v) { S.view = v; S.tagFilter = null; S.nextFilter = null; closeSidebar(); render(); }
function toggleTagFilter(t) { S.tagFilter = S.tagFilter === t ? null : t; closeSidebar(); render(); }

// ── MOBILE SIDEBAR ──
function toggleSidebar() {
  const sb  = document.getElementById('sidebar');
  const ov  = document.getElementById('sidebar-overlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ─── INBOX ─────────────────────────────
function renderInbox(el) {
  const items = DB.items().filter(i => i.status === 'inbox');
  let h = header('📥 Inbox', items.length + ' item' + (items.length !== 1 ? 's' : ''));

  if (!items.length) {
    h += empty('✅', 'Inbox Zero', 'Use the bar above to capture anything on your mind.');
  } else {
    h += `<div class="item-list">`;
    items.forEach(i => {
      h += `<div class="item-row" onclick="openItem(${i.id})">
              <div class="item-body"><div class="item-text">${esc(i.text)}</div></div>
              <span class="item-chevron">›</span>
            </div>`;
    });
    h += `</div>`;
    h += `<p style="font-size:12px;color:var(--muted);margin-top:10px">Click an item to process it — assign tags, move to actions, projects, or park it.</p>`;
  }
  el.innerHTML = h;
}

// ─── NEXT ACTIONS ──────────────────────
function renderNext(el) {
  const tags  = DB.tags();
  const projs = DB.projects().filter(p => p.status !== 'done');
  let items   = DB.items().filter(i => i.status === 'next');
  if (S.nextFilter) items = items.filter(i => (i.tags||[]).includes(S.nextFilter));

  const active     = items.filter(i => !i.done);
  const done       = items.filter(i => i.done);
  const focused    = active.filter(i => i.focus);
  const activeFilt = active.filter(i => !i.focus); // unfocused items for type groups

  let h = header('⚡ Next Actions', active.length + ' active');

  // tag filter row
  if (tags.length) {
    h += `<div class="filter-row"><span class="filter-label">Filter:</span>`;
    tags.forEach(t => {
      const p  = tagPalette(t);
      const on = S.nextFilter === t ? ' on' : '';
      h += `<span class="chip${on}" style="background:${p.bg};color:${p.fg}" onclick="toggleNextFilter('${esc(t)}')">#${esc(t)}</span>`;
    });
    h += `</div>`;
  }

  // ── Today's Focus section ──
  if (focused.length) {
    h += `<div class="focus-section">
      <div class="focus-section-title">⭐ Today's Focus</div>
      <div class="item-list">`;
    focused.forEach(i => { h += itemRow(i, true); });
    h += `</div></div>`;
  }

  if (!active.length && !done.length) {
    h += empty('⚡', 'No next actions', 'Process your inbox or capture a specific task to act on.');
  } else {
    // Group unfocused active items by type → project/role/area
    const TYPES = [
      { key: 'project', label: 'Projects', icon: '📁' },
      { key: 'role',    label: 'Roles',    icon: '👤' },
      { key: 'area',    label: 'Areas',    icon: '🗺️' },
    ];

    let hasAnyGroup = false;
    TYPES.forEach(({ key, label, icon }) => {
      const typeProjs = projs.filter(p => (p.type||'project') === key);
      const typeItems = activeFilt.filter(i => i.project && typeProjs.some(p => p.id === i.project));
      if (!typeItems.length) return;
      hasAnyGroup = true;

      h += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:16px 0 8px;display:flex;align-items:center;gap:6px">${icon} ${label}</div>`;

      const groupIds = [...new Set(typeItems.map(i => i.project))];
      groupIds.forEach(pid => {
        const proj  = typeProjs.find(p => p.id === pid);
        const group = typeItems.filter(i => i.project === pid);
        h += `<div style="font-size:12px;font-weight:600;color:var(--text);padding:4px 0 6px 2px;border-bottom:1px solid var(--border);margin-bottom:4px">${esc(proj ? proj.name : 'Unknown')}</div>`;
        h += `<div class="item-list" style="margin-bottom:12px">`;
        group.forEach(i => { h += itemRow(i, true); });
        h += `</div>`;
      });
    });

    // Unlinked
    const unlinked = activeFilt.filter(i => !i.project);
    if (unlinked.length) {
      if (hasAnyGroup) h += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:16px 0 8px">Unlinked</div>`;
      h += `<div class="item-list" style="margin-bottom:12px">`;
      unlinked.forEach(i => { h += itemRow(i); });
      h += `</div>`;
    }

    // Completed (collapsed at bottom)
    if (done.length) {
      h += `<div class="section-divider">Completed (${done.length})</div><div class="item-list">`;
      done.forEach(i => { h += itemRow(i); });
      h += `</div>`;
    }
  }
  el.innerHTML = h;
}

function toggleNextFilter(t) { S.nextFilter = S.nextFilter === t ? null : t; renderMain(); }

// ─── TAG VIEW ──────────────────────────
function renderTagView(el) {
  const tag   = S.tagFilter;
  const p     = tagPalette(tag);
  const items = DB.items().filter(i => (i.tags||[]).includes(tag) && i.status !== 'inbox');
  const active = items.filter(i => !i.done);
  const notes  = DB.savedNotes().filter(n => (n.tags||[]).includes(tag));

  let h = `<div class="view-header">
    <div><span class="view-title" style="color:${p.fg}">#${esc(tag)}</span>
    <span class="view-count">${active.length} active task${active.length !== 1 ? 's' : ''}${notes.length ? ` · ${notes.length} note${notes.length !== 1 ? 's' : ''}` : ''}</span></div>
  </div>`;

  if (!items.length && !notes.length) {
    h += empty('🏷️', 'No items tagged #' + esc(tag), 'Items you tag with this will appear here.');
  } else {
    const statuses = ['next','waiting','someday'];
    const labels   = { next:'Next Actions', waiting:'Waiting For', someday:'Someday / Maybe' };
    statuses.forEach(s => {
      const group = items.filter(i => i.status === s);
      if (!group.length) return;
      h += `<div class="section-divider">${labels[s]}</div><div class="item-list">`;
      group.forEach(i => { h += itemRow(i); });
      h += `</div>`;
    });

    if (notes.length) {
      h += `<div class="section-divider">Notes</div>`;
      notes.forEach(note => {
        const title   = note.title || 'Untitled';
        const preview = (note.content || note.text || '').replace(/[#*`>_\-]/g,'').trim().slice(0, 100);
        h += `<div class="item-row" onclick="openNoteEditor(${note.id})" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            <span style="font-size:15px">📝</span>
            <span class="item-text" style="font-weight:600">${esc(title)}</span>
          </div>
          ${preview ? `<div style="font-size:12px;color:var(--muted);padding-left:23px;line-height:1.4">${esc(preview)}${(note.content||note.text||'').length > 100 ? '…' : ''}</div>` : ''}
        </div>`;
      });
    }
  }
  el.innerHTML = h;
}

// ─── PROJECTS / ROLES / AREAS (generic) ─
function renderProjLike(el, type, title, icon) {
  const all      = DB.projects().filter(p => (p.type||'project') === type);
  const items    = DB.items();
  const active   = all.filter(p => p.status !== 'done');
  const done     = all.filter(p => p.status === 'done');
  const newLabel = type === 'role' ? 'New Role' : type === 'area' ? 'New Area' : 'New Project';
  const emptyMsg = type === 'role'
    ? 'Roles you play — Leader, Husband, Father, Pastor…'
    : type === 'area'
    ? 'Areas of ongoing responsibility — Finance, Operations, Health…'
    : 'A project is any outcome that requires more than one action.';

  let h = `<div class="view-header">
    <div><span class="view-title">${icon} ${title}</span></div>
    <button class="btn-primary" style="font-size:12px;padding:7px 14px" onclick="openNewProject('${type}')">+ ${newLabel}</button>
  </div>`;

  if (!all.length) h += empty(icon, `No ${title.toLowerCase()} yet`, emptyMsg);

  active.forEach(proj => {
    const pItems  = items.filter(i => i.project === proj.id);
    const pending = pItems.filter(i => !i.done && i.status !== 'waiting');
    const waiting = pItems.filter(i => !i.done && i.status === 'waiting');
    const isOpen  = S.expanded.has(proj.id);
    const tagsH   = (proj.tags||[]).map(t => {
      const p = tagPalette(t);
      return `<span class="item-tag" style="background:${p.bg};color:${p.fg}">#${esc(t)}</span>`;
    }).join('');

    h += `<div class="proj-card">
      <div class="proj-head" onclick="toggleProj('${proj.id}')">
        <span class="proj-arrow${isOpen?' open':''}">▶</span>
        <span class="proj-name">${esc(proj.name)}</span>
        <div class="proj-tags">${tagsH}</div>
        <span class="proj-tally">${pending.length} left${waiting.length ? ` · ${waiting.length} waiting` : ''}</span>
        <button class="proj-menu-btn" onclick="event.stopPropagation();openAddProjTask('${proj.id}')" title="Add task">＋</button>
        <button class="proj-menu-btn" onclick="event.stopPropagation();openEditProject('${proj.id}')" title="Edit / Archive / Delete">⋯</button>
      </div>`;

    if (isOpen) {
      h += `<div class="proj-body">`;
      pending.forEach(i => {
        const rB   = i.recur ? `<span class="recur-badge" style="margin-left:6px">🔁 ${i.recur.freq}</span>` : '';
        const naB  = i.status === 'next' ? `<span style="font-size:10px;color:#2563eb;background:#eff6ff;border-radius:10px;padding:1px 6px;font-weight:600;margin-left:6px">⚡ Next</span>` : '';
        h += `<div class="proj-task">
          <input type="checkbox" class="item-cb" onclick="event.stopPropagation();toggleDone(${i.id})" />
          <span class="proj-task-text" onclick="openItem(${i.id})">${esc(i.text)}${naB}${rB}</span>
        </div>`;
      });
      const doneItems = pItems.filter(i => i.done);
      if (doneItems.length) {
        const archOpen = S.expandedArchive.has(proj.id);
        h += `<div onclick="event.stopPropagation();toggleArchive('${proj.id}')"
          style="display:flex;align-items:center;gap:6px;padding:9px 0 4px;margin-top:4px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;user-select:none;transition:color 0.1s"
          onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
          <span style="font-size:11px">${archOpen ? '▼' : '▶'}</span>
          <span>📦 Archived — ${doneItems.length} task${doneItems.length !== 1 ? 's' : ''}</span>
        </div>`;
        if (archOpen) {
          h += `<div style="padding-bottom:4px">`;
          doneItems.forEach(i => {
            h += `<div class="proj-task" style="opacity:0.65">
              <input type="checkbox" class="item-cb" checked onclick="event.stopPropagation();toggleDone(${i.id})" />
              <span class="proj-task-text done" onclick="openItem(${i.id})">${esc(i.text)}</span>
            </div>`;
          });
          h += `</div>`;
        }
      }
      if (waiting.length) {
        h += `<div style="font-size:10px;color:var(--muted);padding:8px 0 2px;text-transform:uppercase;letter-spacing:0.08em">⏳ Waiting</div>`;
        waiting.forEach(i => {
          h += `<div class="proj-task">
            <span style="font-size:12px;color:var(--muted);width:16px">⏳</span>
            <span class="proj-task-text" onclick="openItem(${i.id})">${esc(i.text)}${i.waitingFor ? ` <span style="color:var(--muted);font-size:11px">· ${esc(i.waitingFor)}</span>` : ''}</span>
          </div>`;
        });
      }
      h += `<div class="proj-add-task" onclick="openAddProjTask('${proj.id}')">＋ Add task</div>`;
      h += `</div>`;
    }
    h += `</div>`;
  });

  if (done.length) {
    h += `<div class="section-divider">Completed</div><div class="item-list">`;
    done.forEach(proj => {
      h += `<div class="item-row" onclick="openEditProject('${proj.id}')">
        <div class="item-body"><div class="item-text done">${esc(proj.name)}</div></div>
        <span class="item-chevron">›</span></div>`;
    });
    h += `</div>`;
  }

  el.innerHTML = h;
}

function toggleProj(id) {
  S.expanded.has(id) ? S.expanded.delete(id) : S.expanded.add(id);
  renderMain();
}

function toggleArchive(projId) {
  S.expandedArchive.has(projId) ? S.expandedArchive.delete(projId) : S.expandedArchive.add(projId);
  renderMain();
}

// ─── ALL OPEN TASKS ────────────────────
function renderAllTasks(el) {
  const tags  = DB.tags();
  const projs = DB.projects();
  let items   = DB.items().filter(i => (i.status === 'next' || i.status === 'waiting') && !i.done);
  if (S.nextFilter) items = items.filter(i => (i.tags||[]).includes(S.nextFilter));

  const total = DB.items().filter(i => (i.status==='next'||i.status==='waiting') && !i.done).length;

  let h = header('📋 All Open Tasks', items.length + (S.nextFilter ? ` shown · ${total} total` : ` task${items.length!==1?'s':''}`));

  if (tags.length) {
    h += `<div class="filter-row"><span class="filter-label">Filter:</span>`;
    tags.forEach(t => {
      const p  = tagPalette(t);
      const on = S.nextFilter === t ? ' on' : '';
      h += `<span class="chip${on}" style="background:${p.bg};color:${p.fg}" onclick="toggleNextFilter('${esc(t)}')">#${esc(t)}</span>`;
    });
    h += `</div>`;
  }

  if (!items.length) {
    h += empty('📋', 'No open tasks', S.nextFilter ? 'Nothing with that tag. Clear the filter to see all.' : 'Your plate is clear.');
  } else {
    // Group: linked (has project/role/area), then unlinked
    const linked   = items.filter(i => i.project);
    const unlinked = items.filter(i => !i.project);

    // Build grouped output by project/role/area
    const groupIds = [...new Set(linked.map(i => i.project))];
    if (groupIds.length) {
      groupIds.forEach(pid => {
        const proj  = projs.find(p => p.id === pid);
        const pType = proj ? (proj.type||'project') : 'project';
        const pIcon = pType==='role' ? '👤' : pType==='area' ? '🗺️' : '📁';
        const group = linked.filter(i => i.project === pid);
        h += `<div class="section-divider">${pIcon} ${esc(proj ? proj.name : 'Unknown')}</div>
              <div class="item-list">`;
        group.forEach(i => { h += itemRow(i); });
        h += `</div>`;
      });
    }

    if (unlinked.length) {
      if (groupIds.length) h += `<div class="section-divider">Unlinked</div>`;
      h += `<div class="item-list">`;
      unlinked.forEach(i => { h += itemRow(i); });
      h += `</div>`;
    }
  }
  el.innerHTML = h;
}

// ─── WAITING FOR ───────────────────────
function renderWaiting(el) {
  const items = DB.items().filter(i => i.status === 'waiting' && !i.done);
  let h = header('⏳ Waiting For', items.length + ' item' + (items.length !== 1 ? 's' : ''));

  if (!items.length) {
    h += empty('⏳', 'Nothing waiting', "Items you've delegated or are waiting on someone else for.");
  } else {
    h += `<div class="item-list">`;
    items.forEach(i => {
      const tagsH = (i.tags||[]).map(t => {
        const p = tagPalette(t);
        return `<span class="item-tag" style="background:${p.bg};color:${p.fg}">#${esc(t)}</span>`;
      }).join('');
      h += `<div class="item-row" onclick="openItem(${i.id})">
        <div class="item-body">
          <div class="item-text">${esc(i.text)}</div>
          <div class="item-meta">
            ${i.waitingFor ? `<span class="item-waiting-badge">👤 ${esc(i.waitingFor)}</span>` : ''}
            ${tagsH}
          </div>
        </div>
        <span class="item-chevron">›</span>
      </div>`;
    });
    h += `</div>`;
  }
  el.innerHTML = h;
}

// ─── SOMEDAY / MAYBE ───────────────────
function renderSomeday(el) {
  const items = DB.items().filter(i => i.status === 'someday');
  let h = header('💭 Someday / Maybe', items.length + ' idea' + (items.length !== 1 ? 's' : ''));

  if (!items.length) {
    h += empty('💭', 'Nothing parked here', "Ideas you're not ready to act on yet — but don't want to forget.");
  } else {
    h += `<div class="item-list">`;
    items.forEach(i => {
      const tagsH = (i.tags||[]).map(t => {
        const p = tagPalette(t);
        return `<span class="item-tag" style="background:${p.bg};color:${p.fg}">#${esc(t)}</span>`;
      }).join('');
      h += `<div class="item-row" onclick="openItem(${i.id})">
        <div class="item-body">
          <div class="item-text">${esc(i.text)}</div>
          <div class="item-meta">${tagsH}</div>
        </div>
        <span class="item-chevron">›</span>
      </div>`;
    });

// ─── HELPERS ───────────────────────────
function header(title, subtitle) {
  return `<div class="view-header">
    <div><span class="view-title">${title}</span><span class="view-count">${subtitle}</span></div>
  </div>`;
}
function empty(icon, title, msg) {
  return `<div class="empty"><div class="e-icon">${icon}</div><h3>${title}</h3><p>${msg}</p></div>`;
}
function itemRow(item, hideProj = false) {
  const tagsH = (item.tags||[]).map(t => {
    const p = tagPalette(t);
    return `<span class="item-tag" style="background:${p.bg};color:${p.fg}">#${esc(t)}</span>`;
  }).join('');
  const linkedProj = item.project ? DB.projects().find(p => p.id === item.project) : null;
  const linkIcon   = linkedProj ? (linkedProj.type==='role'?'👤':linkedProj.type==='area'?'🗺️':'📁') : '';
  const projH    = (!hideProj && linkedProj) ? `<span class="item-proj-badge">${linkIcon} ${esc(linkedProj.name)}</span>` : '';
  const waitH    = item.waitingFor ? `<span class="item-waiting-badge">👤 ${esc(item.waitingFor)}</span>` : '';
  const waitIcon = item.status === 'waiting' ? `<span style="font-size:11px;color:var(--muted)">⏳</span>` : '';
  const recurH   = item.recur ? `<span class="recur-badge">🔁 ${item.recur.freq}</span>` : '';
  const weekH    = item.week  ? `<span style="font-size:10px;color:#0891b2;background:#ecfeff;border-radius:10px;padding:1px 6px;font-weight:600">📅 This Week</span>` : '';
  const starCls  = item.focus ? ' on' : '';
  return `<div class="item-row" onclick="openItem(${item.id})">
    <button class="star-btn${starCls}" onclick="event.stopPropagation();toggleFocus(${item.id})" title="Toggle Today's Focus">⭐</button>
    <input type="checkbox" class="item-cb" ${item.done?'checked':''} onclick="event.stopPropagation();toggleDone(${item.id})" />
    <div class="item-body">
      <div class="item-text${item.done?' done':''}">${esc(item.text)}</div>
      <div class="item-meta">${waitIcon}${recurH}${weekH}${tagsH}${projH}${waitH}</div>
    </div>
    <span class="item-chevron">›</span>
  </div>`;
}

// ═══════════════════════════════════════
//  CAPTURE
// ═══════════════════════════════════════
document.getElementById('cap').addEventListener('keydown', e => { if (e.key === 'Enter') doCapture(); });

function doCapture() {
  const el  = document.getElementById('cap');
  const txt = el.value.trim();
  if (!txt) return;
  const items = DB.items();
  items.push({ id: Date.now(), text: txt, status: 'inbox', tags: [], done: false, notes: '', project: null, waitingFor: '', created: Date.now(), focus: false, recur: null });
  DB.save('items', items);
  el.value = '';
  S.view = 'inbox'; S.tagFilter = null;
  render();
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ═══════════════════════════════════════
//  TOGGLE DONE
// ═══════════════════════════════════════
function toggleDone(id) {
  const items = DB.items();
  const item  = items.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  // Auto-regenerate when a recurring task is completed
  if (item.done && item.recur) {
    items.push({
      id:          Date.now() + Math.floor(Math.random() * 999),
      text:        item.text,
      status:      item.status,
      tags:        [...(item.tags||[])],
      done:        false,
      notes:       item.notes || '',
      project:     item.project || null,
      waitingFor:  item.waitingFor || '',
      created:     Date.now(),
      recur:       { ...item.recur },
      focus:       false,
    });
    showToast(`🔁 Done! Next ${item.recur.freq} recurrence created.`);
  }
  DB.save('items', items);
  render();
}

// ═══════════════════════════════════════
//  ITEM MODAL  (process inbox + edit)
// ═══════════════════════════════════════
function openItem(id) {
  const items    = DB.items();
  const projects = DB.projects();
  const tags     = DB.tags();
  const item     = items.find(i => i.id === id);
  if (!item) return;

  const isInbox = item.status === 'inbox';
  // inbox items have no pre-selection — user must choose; all others default to their current status
  const curDest = item.status === 'inbox'
    ? null
    : (item.status === 'waiting' || item.status === 'someday')
      ? item.status
      : 'next';

  const dests = [
    { id:'next',    label:'⚡ Next Action' },
    { id:'waiting', label:'⏳ Waiting For' },
    { id:'someday', label:'💭 Someday' },
  ];

  const destHtml = dests.map(d =>
    `<button class="dest-btn${curDest===d.id?' on':''}" data-dest="${d.id}" onclick="pickDest(this)">${d.label}</button>`
  ).join('');

  const activeProjs = projects.filter(p => p.status !== 'done');
  const mkOpts = (type, label) => {
    const group = activeProjs.filter(p => (p.type||'project') === type);
    if (!group.length) return '';
    return `<optgroup label="${label}">${group.map(p => `<option value="${esc(p.id)}" ${item.project===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</optgroup>`;
  };
  const projOptions = mkOpts('project','📁 Projects') + mkOpts('role','👤 Roles') + mkOpts('area','🗺️ Areas');

  const tagsHtml = tags.length
    ? tags.map(t => {
        const p = tagPalette(t);
        const on = (item.tags||[]).includes(t) ? ' on' : '';
        return `<span class="pick-chip${on}" data-tag="${esc(t)}" style="background:${p.bg};color:${p.fg}" onclick="togglePickTag(this)">#${esc(t)}</span>`;
      }).join('')
    : `<span style="font-size:12px;color:var(--muted)">Add tags via the sidebar first.</span>`;

  const projVis    = '';  // always visible — any destination can be linked to a project
  const waitingVis = curDest === 'waiting' ? '' : ' hidden';
  const recurVal   = item.recur ? item.recur.freq : '';

  showModal(`
    <div class="modal-title">${isInbox ? '📥 Process Item' : '✏️ Edit Item'}</div>
    <input type="hidden" id="m-id" value="${id}" />
    <div class="field">
      <label>Action / Task</label>
      <input class="inp" id="m-text" type="text" value="${escAttr(item.text)}" />
    </div>
    <div class="field">
      <label>Move to</label>
      <div class="dest-grid" id="dest-grid">${destHtml}</div>
    </div>
    <div class="field${projVis}" id="f-proj">
      <label>Linked to (Project, Role, or Area)</label>
      <select class="inp" id="m-proj">
        <option value="">— unlinked —</option>
        ${projOptions}
      </select>
    </div>
    <div class="field${waitingVis}" id="f-wait">
      <label>Waiting on (person or group)</label>
      <input class="inp" id="m-wait" type="text" placeholder="e.g. Marcus, Elder Board…" value="${escAttr(item.waitingFor||'')}" />
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tag-picker" id="tag-picker">${tagsHtml}</div>
    </div>
    <div class="field">
      <label>Recurring</label>
      <select class="inp" id="m-recur">
        <option value="">One-time only</option>
        <option value="daily"   ${recurVal==='daily'  ?'selected':''}>🔁 Daily</option>
        <option value="weekly"  ${recurVal==='weekly' ?'selected':''}>🔁 Weekly</option>
        <option value="monthly" ${recurVal==='monthly'?'selected':''}>🔁 Monthly</option>
      </select>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:4px 0 14px"/>
    <div class="field">
      <label>Priority Flags</label>
      <label class="cb-row">
        <input type="checkbox" id="m-focus" ${item.focus?'checked':''} style="accent-color:var(--accent)"/>
        <span>⭐ Today's Focus</span>
      </label>
      <label class="cb-row">
        <input type="checkbox" id="m-week" ${item.week?'checked':''} style="accent-color:#0891b2"/>
        <span>📅 Due This Week</span>
      </label>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea class="textarea" id="m-notes" placeholder="Context, details, or reference…">${esc(item.notes||'')}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="deleteItem(${id})">Delete</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveItem()">Save</button>
    </div>
  `);
  document.getElementById('m-text').focus();
}

function pickDest(btn) {
  const wasOn = btn.classList.contains('on');
  document.querySelectorAll('#dest-grid .dest-btn').forEach(b => b.classList.remove('on'));
  if (!wasOn) btn.classList.add('on');
  const dest = btn.classList.contains('on') ? btn.dataset.dest : null;
  document.getElementById('f-wait').classList.toggle('hidden', dest !== 'waiting');
}

function togglePickTag(chip) { chip.classList.toggle('on'); }

function saveItem() {
  const id     = parseInt(document.getElementById('m-id').value);
  const items  = DB.items();
  const item   = items.find(i => i.id === id);
  if (!item) return;

  item.text  = document.getElementById('m-text').value.trim() || item.text;
  item.notes = document.getElementById('m-notes').value;
  item.tags  = [...document.querySelectorAll('#tag-picker .pick-chip.on')].map(c => c.dataset.tag);
  item.focus = document.getElementById('m-focus')?.checked || false;
  item.week  = document.getElementById('m-week')?.checked  || false;
  const recurFreq = document.getElementById('m-recur')?.value;
  item.recur = recurFreq ? { freq: recurFreq } : null;

  const destBtn = document.querySelector('#dest-grid .dest-btn.on');
  const dest    = destBtn ? destBtn.dataset.dest : null;

  // Always save project link regardless of whether a destination was picked
  item.project = document.getElementById('m-proj')?.value || null;

  if (dest) {
    item.status = dest;
  } else if (item.status === 'inbox') {
    // No destination chosen and still in inbox — leave it in inbox
    item.status = 'inbox';
  } else {
    // Already categorized but dest cleared — move to someday if project linked, else inbox
    item.status = item.project ? 'someday' : 'inbox';
  }

  if (item.status === 'waiting') {
    item.waitingFor = document.getElementById('m-wait').value.trim();
  }

  DB.save('items', items);
  closeModal();
  render();
}

function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  DB.save('items', DB.items().filter(i => i.id !== id));
  closeModal();
  render();
}

    ? tags.map(t => {

function saveEditProject(id) {
  const projects = DB.projects();
  const proj     = projects.find(p => p.id === id);
  if (!proj) return;
  proj.name  = document.getElementById('ep-name').value.trim() || proj.name;
  proj.notes = document.getElementById('ep-notes').value;
  proj.tags  = [...document.querySelectorAll('#tag-picker .pick-chip.on')].map(c => c.dataset.tag);
  DB.save('projects', projects);
  closeModal();
  render();
}

function archiveProject(id) {
  if (!confirm('Archive this? It will move to the Completed section and its tasks will be hidden from active views.')) return;
  const projects = DB.projects();
  const proj     = projects.find(p => p.id === id);
  if (!proj) return;
  proj.status = 'done';
  DB.save('projects', projects);
  closeModal();
  render();
}

function unarchiveProject(id) {
  const projects = DB.projects();
  const proj     = projects.find(p => p.id === id);
  if (!proj) return;
  proj.status = 'active';
  DB.save('projects', projects);
  closeModal();
  render();
}

function deleteProject(id) {
  const projects = DB.projects();
  const proj     = projects.find(p => p.id === id);
  if (!proj) return;
  const taskCount = DB.items().filter(i => i.project === id).length;
  const warn = taskCount > 0
    ? `Permanently delete "${proj.name}" and its ${taskCount} linked task${taskCount !== 1 ? 's' : ''}? This cannot be undone.`
    : `Permanently delete "${proj.name}"? This cannot be undone.`;
  if (!confirm(warn)) return;
  DB.save('projects', projects.filter(p => p.id !== id));
  DB.save('items', DB.items().map(i => i.project === id ? { ...i, project: null } : i));
  closeModal();
  render();
}

function openTagModal() {
  const tags = DB.tags();
  const existingHtml = tags.length
    ? tags.map(t => {
        const p = tagPalette(t);
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div class="tag-dot" style="background:${p.fg}"></div>
          <span style="flex:1;font-size:13px">${esc(t)}</span>
          <button onclick="deleteTag('${esc(t)}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 4px">×</button>
        </div>`;
      }).join('')
    : `<p style="font-size:13px;color:var(--muted);padding:6px 0">No tags yet.</p>`;

  showModal(`
    <div class="modal-title">🏷️ Manage Tags</div>
    <div class="field">
      <label>Your Tags</label>
      <div id="existing-tags">${existingHtml}</div>
    </div>
    <div class="field" style="margin-top:16px">
      <label>Add New Tag</label>
      <div style="display:flex;gap:8px">
        <input class="inp" id="new-tag" type="text" placeholder="e.g. church, personal, admin…" style="flex:1"/>
        <button class="btn-primary" onclick="saveNewTag()" style="white-space:nowrap">Add</button>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:5px">Lowercase, no spaces (hyphens ok)</p>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Done</button>
    </div>
  `);
  const inp = document.getElementById('new-tag');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveNewTag(); });
}

function saveNewTag() {
  const inp = document.getElementById('new-tag');
  const val = inp.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
  if (!val) return;
  const tags = DB.tags();
  if (!tags.includes(val)) { tags.push(val); DB.save('tags', tags); }
  inp.value = '';
  openTagModal(); // refresh modal
  render();
}

function deleteTag(tag) {
  if (!confirm(`Remove tag "${tag}"? It will be removed from all items.`)) return;
  DB.save('tags', DB.tags().filter(t => t !== tag));
  // scrub from items
  const items = DB.items().map(i => ({ ...i, tags: (i.tags||[]).filter(t => t !== tag) }));
  DB.save('items', items);
  if (S.tagFilter === tag) S.tagFilter = null;
  openTagModal();
  render();
}

let searchQuery = '';

function renderSearch(el) {
  let h = `<div class="view-header"><span class="view-title">🔍 Search</span></div>
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <input class="inp" id="search-inp" type="text" placeholder="Search tasks, notes, projects…" value="${escAttr(searchQuery)}" style="flex:1;font-size:15px;padding:10px 14px" />
  </div>`;

  if (!searchQuery.trim()) {
    h += `<div class="empty"><div class="e-icon">🔍</div><h3>Start typing to search</h3><p>Searches across all tasks, notes, projects, roles, and areas.</p></div>`;
    el.innerHTML = h;
    const inp = document.getElementById('search-inp');
    if (inp) { inp.focus(); inp.addEventListener('input', e => { searchQuery = e.target.value; renderMain(); }); }
    return;
  }

  const q      = searchQuery.toLowerCase();
  const items  = DB.items().filter(i => i.status !== 'inbox' && !i.done && (i.text||'').toLowerCase().includes(q));
  const projs  = DB.projects().filter(p => p.status !== 'done' && (p.name||'').toLowerCase().includes(q));
  const notes  = DB.savedNotes().filter(n => ((n.title||'') + ' ' + (n.content||'')).toLowerCase().includes(q));
  const total  = items.length + projs.length + notes.length;

  h += `<p style="font-size:12px;color:var(--muted);margin-bottom:16px">${total} result${total!==1?'s':''} for "<strong>${esc(searchQuery)}</strong>"</p>`;

  if (!total) {
    h += `<div class="empty"><div class="e-icon">🤷</div><h3>No results</h3><p>Try a different word or phrase.</p></div>`;
  } else {
    if (items.length) {
      h += `<div class="section-divider">Tasks (${items.length})</div><div class="item-list">`;
      items.forEach(i => { h += itemRow(i); });
      h += `</div>`;
    }
    if (projs.length) {
      h += `<div class="section-divider">Projects, Roles & Areas (${projs.length})</div><div class="item-list">`;
      projs.forEach(p => {
        const icon = p.type==='role' ? '👤' : p.type==='area' ? '🗺️' : '📁';
        h += `<div class="item-row" onclick="openEditProject('${p.id}')">
          <div class="item-body"><div class="item-text">${icon} ${esc(p.name)}</div></div>
          <span class="item-chevron">›</span></div>`;
      });
      h += `</div>`;
    }
    if (notes.length) {
      h += `<div class="section-divider">Saved Notes (${notes.length})</div>`;
      notes.forEach(n => {
        h += `<div class="note-card" onclick="openNoteEditor(${n.id})">
          <div class="note-card-title">${esc(n.title||'Untitled')}</div>
          <div class="note-card-snippet">${esc((n.content||'').slice(0,120))}</div>
        </div>`;
      });
    }
  }

  el.innerHTML = h;
  const inp = document.getElementById('search-inp');
  if (inp) {
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    inp.addEventListener('input', e => { searchQuery = e.target.value; renderMain(); });
  }
}

function exportBackup() {
  const data = {
    exported: new Date().toISOString(),
    items:      DB.items(),
    projects:   DB.projects(),
    tags:       DB.tags(),
    journal:    DB.journal(),
    savedNotes: DB.savedNotes(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `gtd-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDateStr(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-').map(Number);
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const date   = new Date(y, m - 1, d);
  return `${DAYS[date.getDay()]}, ${MONTHS[m-1]} ${d}, ${y}`;
}

function renderNotes(el) {
  const tab = S.notesTab;
  let h = `<div class="view-header"><span class="view-title">📓 Notes</span></div>`;
  h += `<div class="notes-tabs">
    <div class="notes-tab${tab==='journal'?' active':''}" onclick="setNotesTab('journal')">Journal</div>
    <div class="notes-tab${tab==='saved'?' active':''}" onclick="setNotesTab('saved')">Saved Notes</div>
  </div>`;
  h += tab === 'journal' ? buildJournalHtml() : buildSavedNotesHtml();
  el.innerHTML = h;

  if (tab === 'journal') {
    setTimeout(updateJournalPreview, 30);
    const ta = document.getElementById('journal-ta');
    if (ta) {
      let saveTimer;
      ta.addEventListener('input', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          const j = DB.journal();
          j[todayStr()] = ta.value;
          DB.save('journal', j);
          const ind = document.getElementById('j-saved');
          if (ind) { ind.textContent = 'Saved ✓'; setTimeout(() => { if (ind) ind.textContent = ''; }, 1500); }
        }, 600);
      });
    }
  }
}

function setNotesTab(tab) { S.notesTab = tab; S.nextFilter = null; renderMain(); }

function updateJournalPreview() {
  const ta = document.getElementById('journal-ta');
  const preview = document.getElementById('journal-preview');
  if (!ta || !preview) return;
  const val = ta.value.trim();
  if (val) { preview.innerHTML = md(ta.value); preview.style.display = ''; }
  else { preview.style.display = 'none'; }
}

function buildJournalHtml() {
  const journal = DB.journal();
  const today   = todayStr();
  const content = journal[today] || '';

  let h = `<div class="journal-today">
    <div class="journal-today-date">${fmtDateStr(today)} — Today</div>
    <textarea class="journal-ta" id="journal-ta" placeholder="What's on your mind today? Use **bold**, - lists, # headings…" oninput="updateJournalPreview()">${esc(content)}</textarea>
    <div id="journal-preview" class="md-body" style="margin-top:6px;padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:var(--surface);${!content.trim() ? 'display:none' : ''}"></div>
    <div class="journal-saved" id="j-saved"></div>
  </div>`;

  const past = Object.keys(journal)
    .filter(d => d !== today && (journal[d]||'').trim())
    .sort((a,b) => b.localeCompare(a))
    .slice(0, 60);

  if (past.length) {
    h += `<div class="section-divider">Past Entries</div>`;
    past.forEach(date => {
      const text    = journal[date] || '';
      const snippet = text.replace(/\n/g,' ').slice(0, 90) + (text.length > 90 ? '…' : '');
      const isOpen  = S.expandedEntries.has(date);
      h += `<div class="past-entry">
        <div class="past-entry-head" onclick="toggleEntry('${date}')">
          <span class="past-entry-date">${fmtDateStr(date)}</span>
          ${!isOpen ? `<span class="past-entry-snippet">${esc(snippet)}</span>` : ''}
          <span style="color:var(--muted);font-size:11px">${isOpen ? '▲' : '▼'}</span>
        </div>
        ${isOpen ? `<div class="past-entry-body md-body">${md(text)}</div>
        <div style="padding:8px 14px 12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
          <button onclick="deleteJournalEntry('${date}')" style="background:none;border:1px solid #f0d0d0;color:#b94040;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit">Delete Entry</button>
        </div>` : ''}
      </div>`;
    });
  }
  return h;
}

function toggleEntry(date) {
  S.expandedEntries.has(date) ? S.expandedEntries.delete(date) : S.expandedEntries.add(date);
  renderMain();
}

function deleteJournalEntry(date) {
  if (!confirm(`Delete entry for ${fmtDateStr(date)}?`)) return;
  const j = DB.journal();
  delete j[date];
  DB.save('journal', j);
  S.expandedEntries.delete(date);
  renderMain();
}

function buildSavedNotesHtml() {
  const notes  = DB.savedNotes();
  const tags   = DB.tags();
  let filtered = S.nextFilter ? notes.filter(n => (n.tags||[]).includes(S.nextFilter)) : [...notes];
  filtered.sort((a,b) => (b.updated||b.created||0) - (a.updated||a.created||0));

  let h = `<div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn-primary" style="font-size:12px;padding:7px 14px" onclick="openNoteEditor(null)">+ New Note</button>
  </div>`;

  if (tags.length) {
    h += `<div class="filter-row"><span class="filter-label">Filter:</span>`;
    tags.forEach(t => {
      const p  = tagPalette(t);
      const on = S.nextFilter === t ? ' on' : '';
      h += `<span class="chip${on}" style="background:${p.bg};color:${p.fg}" onclick="toggleNextFilter('${esc(t)}')">#${esc(t)}</span>`;
    });
    h += `</div>`;
  }

  if (!filtered.length) {
    h += empty('📝', notes.length ? 'No notes match this filter' : 'No saved notes yet',
      notes.length ? 'Clear the filter to see all notes.' : 'Hit "+ New Note" to save a framework, meeting note, or reflection.');
  } else {
    filtered.forEach(note => {
      const tagsH   = (note.tags||[]).map(t => {
        const p = tagPalette(t);
        return `<span class="item-tag" style="background:${p.bg};color:${p.fg}">#${esc(t)}</span>`;
      }).join('');
      const ts      = note.updated || note.created;
      const d       = new Date(ts);
      const dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const dateLabel = note.updated ? `edited ${dateStr}` : `created ${dateStr}`;
      const rawText    = (note.content || note.text || '');
      const rawSnippet = rawText.replace(/[#*_`>\-]/g,' ').replace(/\n/g,' ').trim().slice(0, 130);
      const snippet    = rawSnippet + (rawText.length > 130 ? '…' : '');
      h += `<div class="note-card" onclick="openNoteEditor(${note.id})">
        <div class="note-card-title">${esc(note.title||'Untitled')}</div>
        ${snippet ? `<div class="note-card-snippet">${esc(snippet)}</div>` : ''}
        <div class="note-card-meta">${tagsH}<span class="note-card-date">${dateLabel}</span></div>
      </div>`;
    });
  }
  return h;
}

function openNoteEditor(id) {
  const notes = DB.savedNotes();
  const tags  = DB.tags();
  const note  = id ? notes.find(n => n.id === id) : null;

  const tagsHtml = tags.length
    ? tags.map(t => {
        const p  = tagPalette(t);
        const on = note && (note.tags||[]).includes(t) ? ' on' : '';
        return `<span class="pick-chip${on}" data-tag="${esc(t)}" style="background:${p.bg};color:${p.fg}" onclick="togglePickTag(this)">#${esc(t)}</span>`;
      }).join('')
    : `<span style="font-size:12px;color:var(--muted)">Add tags via the sidebar first.</span>`;

  showModal(`
    <div class="modal-title">${note ? '✏️ Edit Note' : '📝 New Note'}</div>
    <input type="hidden" id="ne-id" value="${id||''}" />
    <div class="field">
      <label>Title</label>
      <input class="inp" id="ne-title" type="text" placeholder="Name this note…" value="${escAttr(note?.title||'')}" />
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tag-picker" id="tag-picker">${tagsHtml}</div>
    </div>
    <div class="field">
      <label>Note</label>
      <textarea class="note-textarea" id="ne-content" placeholder="Write freely — use **bold**, - lists, # headings…" oninput="updateNotePreview()">${esc(note?.content||'')}</textarea>
      <div id="ne-preview" class="md-body" style="min-height:40px;border:1px solid var(--border);border-radius:8px;padding:11px 13px;background:var(--surface);margin-top:6px;${!(note?.content||'') ? 'display:none' : ''}"></div>
    </div>
    <div class="modal-actions">
      ${note ? `<button class="btn-danger" onclick="deleteNote(${id})">Delete</button>` : ''}
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveNote()">Save</button>
    </div>
  `);
  document.getElementById('modal-inner').classList.add('modal-wide');
  document.getElementById('ne-title').focus();
  setTimeout(updateNotePreview, 50);
}

function updateNotePreview() {
  const ta = document.getElementById('ne-content');
  const preview = document.getElementById('ne-preview');
  if (!ta || !preview) return;
  const val = ta.value.trim();
  if (val) {
    preview.innerHTML = md(ta.value);
    preview.style.display = '';
  } else {
    preview.style.display = 'none';
  }
}

function noteEditorTab(tab) {
  const ta      = document.getElementById('ne-content');
  const preview = document.getElementById('ne-preview');
  const wBtn    = document.getElementById('ne-write-btn');
  const pBtn    = document.getElementById('ne-preview-btn');
  if (tab === 'preview') {
    preview.innerHTML = md(ta.value);
    ta.style.display      = 'none';
    preview.style.display = 'block';
    wBtn.style.background = 'none';   wBtn.style.color = 'var(--muted)';
    pBtn.style.background = 'var(--accent)'; pBtn.style.color = 'white';
  } else {
    ta.style.display      = 'block';
    preview.style.display = 'none';
    wBtn.style.background = 'var(--accent)'; wBtn.style.color = 'white';
    pBtn.style.background = 'none';   pBtn.style.color = 'var(--muted)';
  }
}

function saveNote() {
  const idVal   = document.getElementById('ne-id').value;
  const id      = idVal ? parseInt(idVal) : null;
  const title   = document.getElementById('ne-title').value.trim();
  const content = document.getElementById('ne-content').value;
  const tags    = [...document.querySelectorAll('#tag-picker .pick-chip.on')].map(c => c.dataset.tag);
  const notes   = DB.savedNotes();

  if (id) {
    const note = notes.find(n => n.id === id);
    if (note) { note.title = title||'Untitled'; note.content = content; note.tags = tags; note.updated = Date.now(); }
  } else {
    notes.push({ id: Date.now(), title: title||'Untitled', content, tags, created: Date.now(), updated: Date.now() });
  }
  DB.save('snotes', notes);
  closeModal();
  S.view = 'notes'; S.notesTab = 'saved'; S.tagFilter = null;
  render();
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  DB.save('snotes', DB.savedNotes().filter(n => n.id !== id));
  closeModal();
  render();
}

function toggleFocus(id) {
  const items = DB.items();
  const item  = items.find(i => i.id === id);
  if (item) { item.focus = !item.focus; DB.save('items', items); render(); }
}

function renderFocusView(el) {
  const items   = DB.items();
  const focused = items.filter(i => i.focus && !i.done);
  const weekly  = items.filter(i => i.week  && !i.done && !i.focus); // week-only, not already in today
  const total   = focused.length + weekly.length;
  let h = header("⭐ Today's Focus", total + ' item' + (total !== 1 ? 's' : ''));

  // ── Today section ──
  if (!focused.length) {
    h += `<div class="focus-section" style="text-align:center;padding:24px 16px;margin-bottom:16px">
      <div style="font-size:28px;margin-bottom:8px">⭐</div>
      <div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px">No focus items yet today</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">Open any task and check <strong>⭐ Today's Focus</strong> to surface it here.</div>
    </div>`;
  } else {
    h += `<div class="focus-section">
      <div class="focus-section-title">⭐ Today's non-negotiables</div>
      <div style="font-size:12px;color:#3b82f6;margin-bottom:10px">Lead the day — don't let the day lead you.</div>
    </div>`;
    h += `<div class="item-list">`;
    focused.forEach(i => { h += itemRow(i); });
    h += `</div>`;
  }

  // ── This Week section ──
  h += `<div class="section-divider" style="margin-top:24px">📅 Also Due This Week</div>`;
  if (!weekly.length) {
    h += `<div style="font-size:13px;color:var(--muted);padding:10px 0 4px">No other items flagged for this week. Open a task and check <strong>📅 Due This Week</strong> to add it.</div>`;
  } else {
    h += `<div class="item-list">`;
    weekly.forEach(i => { h += itemRow(i); });
    h += `</div>`;
  }

  el.innerHTML = h;
}

      <div style="font-size:12px;color:#0e7490;margin-bottom:10px">These need to be done before the week closes.</div>
    </div>`;
    h += `<div class="item-list">`;
    weekly.forEach(i => { h += itemRow(i); });
    h += `</div>`;
  }
  el.innerHTML = h;
}
