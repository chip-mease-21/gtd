function renderDailyReview(el) {
  const today   = todayStr();
  const stored  = DB.daily();
  const checked = stored.date === today ? stored.checked : Array(6).fill(false);
  const winText = stored.date === today ? (stored.win || '') : '';
  const doneCount = checked.filter(Boolean).length;
  const pct       = Math.round(doneCount / 6 * 100);

  const greetingHour = new Date().getHours();
  const greeting = greetingHour < 12 ? 'Good morning' : greetingHour < 17 ? 'Good afternoon' : 'Good evening';

  let h = `<div class="view-header">
    <div>
      <span class="view-title">🌅 Daily Review</span>
      <span class="view-count">${doneCount} of 6 complete</span>
    </div>
  </div>`;

  h += `<p style="font-size:13px;color:var(--muted);margin-bottom:14px">${greeting}, Chip · ${fmtDateStr(today)}</p>`;
  h += `<div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if (doneCount === 6) {
    h += `<div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-radius:14px;padding:22px;text-align:center;margin-bottom:20px">
      <div style="font-size:32px;margin-bottom:8px">✝️</div>
      <div style="font-size:16px;font-weight:800;color:var(--accent);margin-bottom:4px">Day prepared. Go lead well.</div>
      <div style="font-size:13px;color:#3b82f6;line-height:1.6">"Commit your work to the Lord, and your plans will be established." — Prov. 16:3</div>
    </div>`;
  }

  DAILY_STEPS.forEach((step, i) => {
    const isChecked = checked[i];
    h += `<div class="review-step${isChecked ? ' checked' : ''}" onclick="toggleDailyStep(${i})">
      <input type="checkbox" class="review-cb" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation();toggleDailyStep(${i})" />
      <div class="review-body">
        <div class="review-step-title">${i + 1}. ${step.title}</div>
        <div class="review-step-desc">${step.desc}</div>
        ${step.hasInput ? `<textarea
            id="daily-win"
            placeholder="e.g. Finish the elder board memo, have a real conversation with Marcus…"
            onclick="event.stopPropagation()"
            oninput="saveDailyWin(this.value)"
            style="width:100%;margin-top:10px;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;resize:none;min-height:60px;line-height:1.6"
          >${esc(winText)}</textarea>` : ''}
        ${step.go ? `<button class="review-go" onclick="event.stopPropagation();setView('${step.go}')">${step.goLabel} →</button>` : ''}
      </div>
    </div>`;
  });

  el.innerHTML = h;

  // Wire up win textarea focus styles
  const winEl = document.getElementById('daily-win');
  if (winEl) {
    winEl.addEventListener('focus', () => { winEl.style.borderColor = 'var(--accent)'; winEl.style.background = '#fff'; });
    winEl.addEventListener('blur',  () => { winEl.style.borderColor = 'var(--border)'; winEl.style.background = 'var(--bg)'; });
  }
}

function toggleDailyStep(idx) {
  const today   = todayStr();
  const stored  = DB.daily();
  const checked = stored.date === today ? [...stored.checked] : Array(6).fill(false);
  const win     = stored.date === today ? (stored.win || '') : '';
  checked[idx]  = !checked[idx];
  localStorage.setItem('g_daily', JSON.stringify({ date: today, checked, win }));
  renderMain();
}

function saveDailyWin(val) {
  const today   = todayStr();
  const stored  = DB.daily();
  const checked = stored.date === today ? stored.checked : Array(6).fill(false);
  localStorage.setItem('g_daily', JSON.stringify({ date: today, checked, win: val }));

  // Sync to Journal — keep a 🏆 Win line at the top of today's entry
  const journal   = DB.journal();
  const existing  = journal[today] || '';
  const WinPrefix = '🏆 Today\'s Win: ';
  const lines     = existing.split('\n');
  const filtered  = lines.filter(l => !l.startsWith(WinPrefix));
  const body      = filtered.join('\n').trimStart();
  if (val.trim()) {
    journal[today] = WinPrefix + val.trim() + (body ? '\n\n' + body : '');
  } else {
    journal[today] = body;
  }
  DB.save('journal', journal);
}

// ═══════════════════════════════════════
function weekStartStr() {
  const d   = new Date();
  const day = d.getDay(); // 0 = Sunday
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}

function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

// ═══════════════════════════════════════
//  ESCAPE HELPERS
// ═══════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
